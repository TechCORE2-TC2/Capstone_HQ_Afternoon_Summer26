
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATAC July 4 Gathering Playlist</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .flyer-section {
            margin-bottom: 30px;
            text-align: center;
        }
        
        .flyer-image {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .content-row {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 24px;
            align-items: start;
            margin-bottom: 40px;
        }

        .song-list {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-height: 560px;
            display: flex;
            flex-direction: column;
        }
        
        .song-list h2 {
            margin-bottom: 12px;
            color: #333;
            font-size: 1.3em;
            flex-shrink: 0;
        }

        .filter-controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 140px;
        }

        .filter-group label {
            font-size: 0.8em;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .filter-select {
            border: 1px solid #d9d9e8;
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 0.9em;
            color: #333;
            background: #fafaff;
        }

        .filter-summary {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .filter-chip {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 999px;
            background: #eef2ff;
            color: #4257b2;
            font-size: 0.78em;
            font-weight: 700;
            text-transform: capitalize;
        }

        .filter-chip-all {
            background: #f3f4f6;
            color: #6b7280;
        }

        #songsList {
            overflow-y: auto;
            padding-right: 6px;
        }
        
        .song-item {
            padding: 12px 15px;
            margin: 8px 0;
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        
        .song-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }

        .song-title {
            font-weight: bold;
            color: #333;
        }

        .song-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 0.72em;
            font-weight: 700;
            letter-spacing: 0.02em;
            text-transform: capitalize;
            line-height: 1.2;
        }

        .tag-era {
            background: #e8f0ff;
            color: #3658a6;
        }

        .tag-popularity {
            background: #f4e8ff;
            color: #7a3fb8;
        }
        
        .song-artist {
            font-size: 0.85em;
            color: #666;
        }

        .empty-state {
            padding: 20px 10px;
            text-align: center;
            color: #777;
            font-size: 0.95em;
        }
        
        .song-item:hover {
            background: #e8e8ff;
            transform: translateX(5px);
        }
        
        .song-item.active {
            background: #667eea;
            color: white;
            border-left-color: #764ba2;
        }
        
        .player-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            margin-bottom: 30px;
            border-radius: 8px;
            background: #000;
        }
        
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .song-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 900px) {
            .content-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 600px) {
            .song-info {
                grid-template-columns: 1fr;
            }
        }
        
        .info-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        
        .info-label {
            font-weight: bold;
            color: #667eea;
            font-size: 0.9em;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .info-value {
            color: #333;
            font-size: 1.1em;
        }
        
        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
            }
            
            .song-info {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="flyer-section">
            <img src="july4_gathering.jpg" alt="Gathering Flyer" class="flyer-image">
        </div>
        
        <h1>🎵 Gathering Playlist</h1>
        
        <div class="content-row">
            <div class="song-list">
                <h2>Songs</h2>
                <div class="filter-controls">
                    <div class="filter-group">
                        <label for="eraFilter">Era</label>
                        <select id="eraFilter" class="filter-select">
                            <option value="">All eras</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="popularityFilter">Popularity</label>
                        <select id="popularityFilter" class="filter-select">
                            <option value="">All popularities</option>
                        </select>
                    </div>
                </div>
                <div id="filterSummary" class="filter-summary"></div>
                <div id="songsList"></div>
            </div>
            
            <div class="player-section">
                <div class="video-container">
                    <iframe id="videoPlayer" src="" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                </div>
                
                <div class="song-info">
                    <div class="info-item">
                        <div class="info-label">Artists</div>
                        <div class="info-value" id="artists">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Date Released</div>
                        <div class="info-value" id="dateReleased">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Streams</div>
                        <div class="info-value" id="streams">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Explicit</div>
                        <div class="info-value" id="explicit">-</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let allSongs = [];
        let selectedSong = null;

        async function loadSongs() {
            const response = await fetch('./songs_data.json');
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const songs = await response.json();
            initializeSongs(songs);
        }
        
        function formatTag(value) {
            if (!value) return 'Unknown';
            return String(value)
                .split(/[^a-zA-Z0-9]+/)
                .filter(Boolean)
                .map(part => part.charAt(0).toUpperCase() + part.slice(1))
                .join(' ');
        }

        function populateFilterOptions(songs) {
            const eraFilter = document.getElementById('eraFilter');
            const popularityFilter = document.getElementById('popularityFilter');
            const currentEra = eraFilter.value;
            const currentPopularity = popularityFilter.value;

            const eras = [...new Set(songs.map(song => song.era).filter(Boolean))].sort();
            const popularities = [...new Set(songs.map(song => song.popularity).filter(Boolean))].sort();

            eraFilter.innerHTML = '<option value="">All eras</option>';
            eras.forEach(era => {
                const option = document.createElement('option');
                option.value = era;
                option.textContent = formatTag(era);
                eraFilter.appendChild(option);
            });

            popularityFilter.innerHTML = '<option value="">All popularities</option>';
            popularities.forEach(popularity => {
                const option = document.createElement('option');
                option.value = popularity;
                option.textContent = formatTag(popularity);
                popularityFilter.appendChild(option);
            });

            if (eras.includes(currentEra)) {
                eraFilter.value = currentEra;
            }
            if (popularities.includes(currentPopularity)) {
                popularityFilter.value = currentPopularity;
            }
        }

        function updateFilterSummary() {
            const summary = document.getElementById('filterSummary');
            const eraValue = document.getElementById('eraFilter').value;
            const popularityValue = document.getElementById('popularityFilter').value;
            const chips = [];

            if (eraValue) {
                chips.push(`<span class="filter-chip">Era: ${formatTag(eraValue)}</span>`);
            }
            if (popularityValue) {
                chips.push(`<span class="filter-chip">Popularity: ${formatTag(popularityValue)}</span>`);
            }

            summary.innerHTML = chips.length > 0
                ? chips.join('')
                : '<span class="filter-chip filter-chip-all">Showing all songs</span>';
        }

        function getFilteredSongs() {
            const eraValue = document.getElementById('eraFilter').value;
            const popularityValue = document.getElementById('popularityFilter').value;

            return allSongs.filter(song => {
                const matchesEra = !eraValue || song.era === eraValue;
                const matchesPopularity = !popularityValue || song.popularity === popularityValue;
                return matchesEra && matchesPopularity;
            });
        }

        function clearPlayer() {
            document.getElementById('videoPlayer').src = '';
            document.getElementById('artists').textContent = '-';
            document.getElementById('dateReleased').textContent = '-';
            document.getElementById('streams').textContent = '-';
            document.getElementById('explicit').textContent = '-';
            document.querySelectorAll('.song-item.active').forEach(item => item.classList.remove('active'));
            selectedSong = null;
        }

        function renderSongs(filteredSongs) {
            const songsList = document.getElementById('songsList');
            songsList.innerHTML = '';

            if (filteredSongs.length === 0) {
                const emptyState = document.createElement('div');
                emptyState.className = 'empty-state';
                emptyState.textContent = 'No songs match those filters.';
                songsList.appendChild(emptyState);
                clearPlayer();
                return;
            }

            filteredSongs.forEach(song => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.dataset.songTitle = song.title;

                if (selectedSong && selectedSong.title === song.title) {
                    div.classList.add('active');
                }

                const titleRow = document.createElement('div');
                titleRow.className = 'song-title-row';

                const title = document.createElement('div');
                title.className = 'song-title';
                title.textContent = song.title;

                const tags = document.createElement('div');
                tags.className = 'song-tags';

                const eraTag = document.createElement('span');
                eraTag.className = 'tag tag-era';
                eraTag.textContent = formatTag(song.era);

                const popularityTag = document.createElement('span');
                popularityTag.className = 'tag tag-popularity';
                popularityTag.textContent = formatTag(song.popularity);

                tags.appendChild(eraTag);
                tags.appendChild(popularityTag);
                titleRow.appendChild(title);
                titleRow.appendChild(tags);

                const artist = document.createElement('div');
                artist.className = 'song-artist';
                artist.textContent = song.artists;

                div.appendChild(titleRow);
                div.appendChild(artist);
                div.onclick = (event) => playSong(song, event.currentTarget);
                songsList.appendChild(div);
            });

            const activeSong = selectedSong && filteredSongs.some(song => song.title === selectedSong.title)
                ? selectedSong
                : filteredSongs[0];

            if (activeSong) {
                const activeElement = songsList.querySelector(`[data-song-title="${activeSong.title}"]`);
                playSong(activeSong, activeElement);
            }
        }

        function initializeSongs(songs) {
            allSongs = songs;
            populateFilterOptions(songs);
            updateFilterSummary();

            document.getElementById('eraFilter').onchange = () => {
                updateFilterSummary();
                renderSongs(getFilteredSongs());
            };

            document.getElementById('popularityFilter').onchange = () => {
                updateFilterSummary();
                renderSongs(getFilteredSongs());
            };

            renderSongs(getFilteredSongs());
        }
        
        function playSong(song, songElement) {
            let embedUrl = song.youtube_url;
            
            // If it's already an embed URL, use it directly
            if (embedUrl.includes('/embed/')) {
                // It's already in embed format
            } else if (embedUrl.includes('youtu.be')) {
                // Handle youtu.be short URLs
                const videoId = embedUrl.match(/youtu\.be\/([^?]+)/)[1];
                const params = embedUrl.includes('?') ? '?' + embedUrl.split('?')[1] : '';
                embedUrl = `https://www.youtube.com/embed/${videoId}${params}`;
            } else {
                // Handle regular watch URLs
                const matches = embedUrl.match(/watch\?v=([^&]+)/);
                if (matches) {
                    const videoId = matches[1];
                    const params = embedUrl.includes('si=') ? embedUrl.match(/si=([^&]*)/)[0] : '';
                    embedUrl = `https://www.youtube.com/embed/${videoId}${params ? '?' + params : ''}`;
                }
            }
            
            document.getElementById('videoPlayer').src = embedUrl;
            
            document.getElementById('artists').textContent = song.artists || '-';
            document.getElementById('dateReleased').textContent = song.date_released || '-';
            document.getElementById('streams').textContent = song.streams ? Number(song.streams).toLocaleString() : '-';
            document.getElementById('explicit').textContent = song.explicit ? 'Yes' : 'No';
            
            document.querySelectorAll('.song-item').forEach((item) => {
                item.classList.remove('active');
            });

            selectedSong = song;

            if (songElement) {
                songElement.classList.add('active');
            }
        }
        
        loadSongs();
    </script>
</body>
</html>
